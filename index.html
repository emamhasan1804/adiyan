<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adiyan</title>

    <style>
        body {
            margin: 0;
        }

        .container {
            height: 100vh;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 200px;
            text-align: center;
        }

        /* Tablet */
        @media (max-width: 1024px) {
            h1 {
                font-size: 120px;
            }
        }

        /* Mobile */
        @media (max-width: 600px) {
            h1 {
                font-size: 60px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>আদিয়ান মগা</h1>
    </div>
</body>
</html>
